<a *ngFor="let video of videos | searchBar: searchService.searchTerm()" href="{{video.url}}" target="_blank" class="video-link">
    <div>
        <img [src]="video.img_src" [alt]="video.title">
        <div>
            <div class="author-photo-div">
                <img [src]="video.author_src" [alt]="video.author">
            </div>
            <div class="author-info-div">
                <p class="video-title">{{video.title}}</p>
                <p class="video-author">{{video.author}}</p>   
                <p class="video-info">{{video.date | dateFormat}} - {{video.views | viewFormat}} views</p>

            </div>
        </div>
    </div>
</a>
